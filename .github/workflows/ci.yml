name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: transcoder/package-lock.json

      - name: Install transcoder dependencies
        run: cd transcoder && npm ci

      - name: Type-check transcoder
        run: cd transcoder && npx tsc --noEmit

      - name: Test transcoder
        run: cd transcoder && npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QC test dependencies
        run: pip install pytest

      - name: Test QC
        run: cd qc && python -m pytest test_qc.py -v

      - name: Validate docker-compose
        run: docker compose config --quiet
